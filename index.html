<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>梦角哥在这些时刻的反应</title>
<meta name="description" content="你选的每一个答案 都是你在梦里见过的他">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Serif+JP:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
/* === Design Tokens === */
:root{
  /* Colors - Warm Dreamy Blue */
  --bg:#0f1d30;
  --bg-elevated:#182d48;
  --surface:rgba(24,45,72,0.6);
  --blue:#b4dfff;
  --blue-soft:#cce8ff;
  --blue-warm:#e0f2ff;
  --blue-dim:#3d6d99;
  --blue-glow:rgba(180,223,255,0.25);
  --white:#f4f9ff;
  --white-muted:rgba(244,249,255,0.8);
  --gray:#9dbdd9;

  /* Spacing - 4px base */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px;
  --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px;
  --sp-12:48px; --sp-16:64px;

  /* Typography Scale */
  --fs-xs:10px; --fs-sm:12px; --fs-base:14px; --fs-md:16px;
  --fs-lg:20px; --fs-xl:28px; --fs-2xl:36px; --fs-3xl:clamp(38px,10vw,52px);

  /* Radius */
  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-pill:100px;

  /* Shadows */
  --shadow-sm:0 2px 8px rgba(0,0,0,0.2);
  --shadow-md:0 8px 24px rgba(0,0,0,0.3);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.4);
  --shadow-glow:0 0 20px var(--blue-glow);

  /* Transitions */
  --ease-out:cubic-bezier(.2,0,.0,1);
  --ease-spring:cubic-bezier(.4,1.3,.6,1);
  --dur-fast:200ms; --dur-normal:400ms; --dur-slow:700ms;
}

/* === Reset === */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100dvh;overflow-x:hidden;font-family:'Shippori Mincho','Noto Serif JP',serif;color:var(--white);background:var(--bg);-webkit-font-smoothing:antialiased}
::selection{background:var(--blue);color:var(--bg)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--blue-dim);border-radius:var(--r-pill)}
button{font-family:inherit;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* === Background Atmosphere === */
.dream-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.dream-bg .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.4;will-change:transform;animation:drift 14s ease-in-out infinite}
.dream-bg .orb:nth-child(1){width:50vw;height:50vw;max-width:360px;max-height:360px;top:-10%;left:-15%;background:radial-gradient(circle,rgba(180,223,255,0.5),transparent 70%);animation-duration:16s}
.dream-bg .orb:nth-child(2){width:40vw;height:40vw;max-width:280px;max-height:280px;bottom:-5%;right:-10%;background:radial-gradient(circle,rgba(204,232,255,0.4),transparent 70%);animation-duration:12s;animation-delay:4s}
.dream-bg .orb:nth-child(3){width:35vw;height:35vw;max-width:240px;max-height:240px;top:40%;left:50%;background:radial-gradient(circle,rgba(224,242,255,0.3),transparent 70%);animation-duration:18s;animation-delay:8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-20px) scale(1.05)}66%{transform:translate(-20px,25px) scale(0.95)}}

/* Sparkles */
.sparkles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.sparkle{position:absolute;border-radius:50%;opacity:0;animation:twinkle 3s ease-in-out infinite}
.sparkle.star5{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:var(--blue-warm)}
.sparkle.bubble{background:rgba(180,223,255,0.06);border:1px solid rgba(204,232,255,0.2)}
.sparkle.dot{background:var(--blue-warm)}
.sparkle.moon{background:transparent;width:16px!important;height:16px!important;border-radius:50%;box-shadow:inset -4px 0 0 0 var(--blue-warm);animation:moonGlow 6s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:0.8;transform:scale(1.1)}}
@keyframes moonGlow{0%,100%{opacity:0.1}50%{opacity:0.5}}

/* Fog */
.fog{position:fixed;inset:0;z-index:2;pointer-events:none}
.fog-canvas{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity 2.5s var(--ease-out)}
.fog-canvas.active{opacity:1}

/* === Layout === */
.page{display:none;width:100%;min-height:100dvh;position:relative;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp-16) var(--sp-5) var(--sp-10);z-index:3}
.page.active{display:flex;animation:pageIn var(--dur-slow) var(--ease-out) forwards}
#cover-page.page{padding:0}
#cover-page.page.active{animation:none}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.page-content{position:relative;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center}

/* Language Toggle */
.lang-toggle{position:fixed;top:var(--sp-4);right:var(--sp-4);z-index:9999;background:var(--surface);backdrop-filter:blur(12px);border:1px solid rgba(180,223,255,0.15);border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-4);font-size:var(--fs-xs);color:var(--blue);transition:all var(--dur-fast) var(--ease-out);letter-spacing:0.5px}
.lang-toggle:hover,.lang-toggle:active{background:var(--blue);color:var(--bg)}

/* === COVER === */
.cover-full{position:relative;width:100%;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}
.cover-full::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,29,48,0.2) 0%,rgba(15,29,48,0.6) 50%,rgba(15,29,48,0.92) 100%);z-index:2}

.cover-carousel{position:absolute;inset:0;z-index:1;display:flex;width:1600%;animation:carouselSlide 40s linear infinite}
.cover-carousel img{width:6.25%;height:100%;object-fit:cover;flex-shrink:0;opacity:0.5;filter:blur(1px) saturate(0.7)}
@keyframes carouselSlide{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.cover-stars{position:absolute;inset:0;z-index:3;pointer-events:none}
.cover-stars .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 2.5s ease-in-out infinite}

.cover-content{position:relative;z-index:4;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 var(--sp-8) var(--sp-16)}
.cover-tag{font-size:var(--fs-xs);color:var(--gray);letter-spacing:3px;margin-bottom:var(--sp-3);opacity:0.7;text-transform:uppercase}
.cover-title{font-size:var(--fs-3xl);color:#fff;line-height:1.25;margin-bottom:var(--sp-4);text-shadow:0 0 40px var(--blue-glow);font-weight:800;letter-spacing:-0.5px}
.cover-title span{color:var(--blue-soft)}
.cover-sub{font-size:var(--fs-sm);color:var(--gray);line-height:2.2;margin-bottom:var(--sp-10);font-weight:400;letter-spacing:0.3px}
.cover-btn{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-4) var(--sp-8);background:rgba(180,223,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(180,223,255,0.25);color:var(--blue-soft);border-radius:var(--r-pill);font-size:var(--fs-base);transition:all var(--dur-normal) var(--ease-out);letter-spacing:1px}
.cover-btn:hover,.cover-btn:active{background:rgba(180,223,255,0.18);box-shadow:var(--shadow-glow);transform:translateY(-2px)}

/* === INTRO === */
.intro-text{font-size:var(--fs-xl);color:var(--white);text-align:center;line-height:1.8;opacity:0;text-shadow:0 0 20px var(--blue-glow);font-weight:600;letter-spacing:1px}
.intro-text:nth-child(1){animation:pageIn .8s var(--ease-out) .3s forwards}
.intro-text:nth-child(2){animation:pageIn .8s var(--ease-out) .9s forwards}
.btn-go{margin-top:var(--sp-12);padding:var(--sp-4) var(--sp-8);background:rgba(180,223,255,0.06);backdrop-filter:blur(8px);border:1px solid rgba(180,223,255,0.2);color:var(--blue-soft);border-radius:var(--r-pill);font-size:var(--fs-base);opacity:0;animation:pageIn .6s var(--ease-out) 1.5s forwards;transition:all var(--dur-normal) var(--ease-out)}
.btn-go:hover,.btn-go:active{background:rgba(180,223,255,0.15);box-shadow:var(--shadow-glow)}

/* === QUIZ === */
.q-progress{width:100%;display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-6)}
.q-num{font-family:'Playfair Display',serif;font-size:var(--fs-lg);font-weight:700;color:var(--blue);font-style:italic;min-width:32px}
.q-bar{flex:1;height:2px;background:rgba(61,109,153,0.4);border-radius:var(--r-pill);overflow:hidden}
.q-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue));transition:width .6s var(--ease-out);border-radius:var(--r-pill)}
.q-label{font-size:var(--fs-xs);color:var(--gray);letter-spacing:2px;margin-bottom:var(--sp-2);opacity:0.8}
.q-text{font-size:var(--fs-base);line-height:2;color:var(--white);margin-bottom:var(--sp-6);letter-spacing:0.2px}
.opts{width:100%;display:flex;flex-direction:column;gap:var(--sp-3)}
.opt{width:100%;padding:var(--sp-4) var(--sp-5);background:var(--surface);backdrop-filter:blur(12px);border:1px solid rgba(180,223,255,0.06);border-radius:var(--r-md);font-size:var(--fs-sm);line-height:1.9;color:var(--white);text-align:left;transition:all var(--dur-normal) var(--ease-out)}
.opt:hover{border-color:rgba(180,223,255,0.2);background:rgba(180,223,255,0.04)}
.opt:active{transform:scale(0.98)}
.opt.picked{border-color:var(--blue-soft);background:rgba(180,223,255,0.1);box-shadow:var(--shadow-glow)}

/* === SLIDER === */
.slider-box{width:100%;padding:var(--sp-6) 0}
.slider-labels{display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--gray);margin-bottom:var(--sp-5)}
.s-range{width:100%;-webkit-appearance:none;height:3px;background:linear-gradient(90deg,var(--blue-dim),var(--blue-soft));border-radius:var(--r-pill);outline:none}
.s-range::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:radial-gradient(circle,var(--blue-soft) 40%,var(--blue-dim));border:2px solid var(--blue-warm);border-radius:50%;cursor:pointer;box-shadow:0 0 12px var(--blue-glow)}
.s-confirm{margin-top:var(--sp-6);width:100%;padding:var(--sp-4);background:rgba(180,223,255,0.05);backdrop-filter:blur(8px);border:1px solid rgba(180,223,255,0.18);color:var(--blue-soft);border-radius:var(--r-pill);font-size:var(--fs-base);transition:all var(--dur-fast) var(--ease-out)}
.s-confirm:hover,.s-confirm:active{background:rgba(180,223,255,0.12);box-shadow:var(--shadow-glow)}

/* === FLIP === */
.flip-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);width:100%}
.f-card{aspect-ratio:2.5/4;perspective:900px;cursor:pointer}
.f-inner{width:100%;height:100%;position:relative;transition:transform .8s var(--ease-spring);transform-style:preserve-3d}
.f-card.open .f-inner{transform:rotateY(180deg)}
.f-front,.f-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;padding:var(--sp-3)}
.f-front{background:linear-gradient(135deg,rgba(61,109,153,0.5),rgba(15,29,48,0.8));border:1px solid rgba(180,223,255,0.15);font-size:var(--fs-xl);color:var(--blue-soft);backdrop-filter:blur(8px);box-shadow:var(--shadow-md)}
.f-back{background:var(--surface);border:1px solid rgba(180,223,255,0.1);transform:rotateY(180deg);font-size:var(--fs-xs);line-height:1.8;color:var(--white-muted);overflow-y:auto;text-align:left;backdrop-filter:blur(10px)}

/* === WAITING === */
.wait-glow{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,var(--blue-soft),transparent 70%);opacity:0.35;margin-bottom:var(--sp-8);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.25}50%{transform:scale(1.3);opacity:0.55;box-shadow:0 0 40px var(--blue-glow)}}
.wait-text{font-size:var(--fs-lg);color:var(--gray);text-align:center;line-height:2.2;text-shadow:0 0 10px rgba(180,223,255,0.15);font-weight:600}

/* === RESULT === */
.res-wrap{width:100%;animation:pageIn .8s var(--ease-out) forwards}
.res-img-box{width:100%;border-radius:var(--r-lg);overflow:hidden;margin-bottom:var(--sp-5);position:relative;box-shadow:var(--shadow-lg),0 0 30px rgba(180,223,255,0.08)}
.res-img-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,var(--bg),transparent);pointer-events:none}
.res-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.res-badge{display:inline-block;font-size:var(--fs-xs);color:var(--blue-soft);border:1px solid var(--blue-dim);border-radius:var(--r-pill);padding:var(--sp-1) var(--sp-4);margin-bottom:var(--sp-3);letter-spacing:1px}
.res-title{font-size:var(--fs-xl);color:#fff;line-height:1.4;margin-bottom:var(--sp-5);text-shadow:0 0 20px var(--blue-glow);font-weight:700}
.res-story{font-size:var(--fs-sm);line-height:2.2;color:var(--white-muted);margin-bottom:var(--sp-5);padding:var(--sp-5);background:rgba(61,109,153,0.1);border-radius:var(--r-md);border:1px solid rgba(180,223,255,0.04);max-height:320px;overflow-y:auto;backdrop-filter:blur(4px)}
.res-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:var(--fs-base);color:var(--blue-soft);text-align:center;padding:var(--sp-5);margin:var(--sp-4) 0;border-top:1px solid rgba(180,223,255,0.12);border-bottom:1px solid rgba(180,223,255,0.12);line-height:1.8}
.res-daily{font-size:var(--fs-xs);line-height:2.2;color:var(--gray);padding:var(--sp-4);background:rgba(15,29,48,0.5);border-radius:var(--r-sm);margin:var(--sp-3) 0}
.res-tags{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin:var(--sp-4) 0}
.res-tag{font-size:var(--fs-xs);color:var(--blue-soft);background:rgba(180,223,255,0.05);padding:var(--sp-1) var(--sp-3);border-radius:var(--r-pill);border:1px solid rgba(180,223,255,0.1)}
.res-btns{display:flex;gap:var(--sp-3);margin-top:var(--sp-6);width:100%}
.btn-a{flex:1;padding:var(--sp-4);border-radius:var(--r-pill);font-size:var(--fs-sm);text-align:center;transition:all var(--dur-normal) var(--ease-out);letter-spacing:0.5px}
.btn-a.pri{background:linear-gradient(135deg,var(--blue),var(--blue-soft));color:var(--bg);font-weight:600;box-shadow:0 4px 16px rgba(180,223,255,0.25)}
.btn-a.sec{background:transparent;color:var(--blue-soft);border:1px solid var(--blue-dim)}
.btn-a:hover,.btn-a:active{transform:translateY(-2px);box-shadow:var(--shadow-glow)}

/* === SHARE === */
.share-card{width:85%;max-width:300px;aspect-ratio:3/4;background:var(--bg-elevated);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg);border:1px solid rgba(180,223,255,0.08);display:flex;flex-direction:column}
.share-card img{width:100%;height:55%;object-fit:cover}
.share-card-body{flex:1;padding:var(--sp-5);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:var(--sp-3)}
.share-hint{font-size:var(--fs-xs);color:var(--gray);letter-spacing:1px}
.share-qt{font-family:'Playfair Display',serif;font-style:italic;font-size:var(--fs-sm);color:var(--blue-soft);line-height:1.8}
.share-tags{display:flex;gap:var(--sp-2);flex-wrap:wrap;justify-content:center}
.share-btns{margin-top:var(--sp-6);display:flex;gap:var(--sp-3)}

/* === Responsive & Accessibility === */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(min-width:768px){.page-content{max-width:400px}.cover-full{max-width:430px;margin:0 auto}}
@supports(padding-bottom:env(safe-area-inset-bottom)){.page{padding-bottom:calc(var(--sp-10) + env(safe-area-inset-bottom))}}
</style>
</head>
<body>

<div class="dream-bg">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="sparkles" id="sparkles"></div>

<div class="fog" id="fogLayer">
  <canvas class="fog-canvas" id="fogCanvas"></canvas>
</div>

<button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>

<div id="cover-page" class="page active">
  <div class="cover-full">
    <div class="cover-carousel" id="carousel">
      <img src="images/result1.png" alt=""><img src="images/result2.png" alt=""><img src="images/result3.png" alt=""><img src="images/result4.png" alt=""><img src="images/result5.png" alt=""><img src="images/result6.png" alt=""><img src="images/result7.png" alt=""><img src="images/result8.png" alt=""><img src="images/result1.png" alt=""><img src="images/result2.png" alt=""><img src="images/result3.png" alt=""><img src="images/result4.png" alt=""><img src="images/result5.png" alt=""><img src="images/result6.png" alt=""><img src="images/result7.png" alt=""><img src="images/result8.png" alt="">
    </div>
    <div class="cover-stars" id="coverStars"></div>
    <div class="cover-content">
      <p class="cover-tag" data-zh="梦女向心动测试 · 12题" data-en="Dream BF Quiz · 12Q">梦女向心动测试 · 12题</p>
      <h1 class="cover-title" data-zh="梦角哥在<br>这些时刻的<span>反应</span>" data-en="How He<br><span>Reacts</span>">梦角哥在<br>这些时刻的<span>反应</span></h1>
      <p class="cover-sub" data-zh="你选的每一个答案<br>都是你在梦里见过的他" data-en="Every answer you choose<br>is him you've seen in dreams">你选的每一个答案<br>都是你在梦里见过的他</p>
      <button class="cover-btn" onclick="goToIntro()" data-zh="✦ 入梦" data-en="✦ Enter">✦ 入梦</button>
    </div>
  </div>
</div>

<div id="intro-page" class="page">
  <div class="page-content">
    <p class="intro-text" data-zh="今晚入梦前" data-en="Before you dream tonight">今晚入梦前</p>
    <p class="intro-text" data-zh="他想让你看到这些" data-en="He wants you to see these">他想让你看到这些</p>
    <button class="btn-go" onclick="startQuiz()" data-zh="我准备好了" data-en="I'm ready">我准备好了</button>
  </div>
</div>

<div id="quiz-page" class="page">
  <div class="page-content">
    <div class="q-progress">
      <span class="q-num" id="qNum">01</span>
      <div class="q-bar"><div class="q-bar-fill" id="qFill" style="width:8%"></div></div>
    </div>
    <div id="questionArea"></div>
  </div>
</div>

<div id="waiting-page" class="page">
  <div class="page-content">
    <div class="wait-glow"></div>
    <p class="wait-text" data-zh="他在梦的那一边<br>等你翻开这一页" data-en="On the other side<br>he waits for you">他在梦的那一边<br>等你翻开这一页</p>
  </div>
</div>

<div id="result-page" class="page">
  <div class="page-content">
    <div class="res-wrap" id="resultArea"></div>
    <div class="res-btns">
      <button class="btn-a pri" onclick="showShare()" data-zh="分享" data-en="Share">分享</button>
      <button class="btn-a sec" onclick="restart()" data-zh="再测" data-en="Again">再测</button>
    </div>
  </div>
</div>

<div id="share-page" class="page">
  <div class="page-content">
    <div class="share-card" id="shareArea"></div>
    <div class="share-btns">
      <button class="btn-a sec" onclick="showResult()" data-zh="返回" data-en="Back">返回</button>
      <button class="btn-a pri" onclick="restart()" data-zh="再测" data-en="Again">再测</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="data2.js"></script>
<script src="results1.js"></script>
<script src="results2.js"></script>
<script src="main.js"></script>
</body>
